packages:
  - packages/*
  - apps/*

# Single source of version truth for dependencies shared across ≥2 workspaces.
# Reference from package.json with the `catalog:` protocol. On `pnpm publish`,
# pnpm replaces `catalog:` with the resolved version below.
# NOTE: peerDependencies are intentionally NOT cataloged — they express loose
# compatibility ranges (e.g. `^11`) distinct from the pinned dev/runtime version.
catalog:
  '@keyv/redis': ^5.1.6
  '@nestjs/bullmq': ^11.0.4
  '@nestjs/cache-manager': ^3.1.0
  '@nestjs/common': ^11.1.17
  '@nestjs/config': 4.0.2
  '@nestjs/core': ^11.1.17
  '@nestjs/event-emitter': ^3.0.1
  '@nestjs/platform-express': ^11.1.17
  '@nestjs/swagger': 11.2.1
  '@nestjs/terminus': ^11.1.1
  '@nestjs/throttler': ^6.5.0
  '@scalar/nestjs-api-reference': ^1.1.4
  '@types/express': ^5.0.6
  '@types/node': ^25.5.0
  '@types/pg': 8.15.6
  bullmq: ^5.77.0
  cache-manager: ^7.2.8
  class-transformer: 0.5.1
  class-validator: 0.14.2
  dependency-cruiser: ^17.0.0
  dotenv: ^17.3.1
  drizzle-orm: 0.44.7
  helmet: ^8.1.0
  keyv: ^5.6.0
  nestjs-cls: ^6.2.0
  nestjs-pino: ^4.6.1
  pg: 8.16.3
  rxjs: ^7.8.2
  tsdown: ^0.21.4
  typescript: ^5.9.3
  vitest: ^4.1.0
  zod: ^4.3.6

ignoredBuiltDependencies:
  - sharp
  - unrs-resolver
