name: CI

on:
  push:
    branches: [main, init-infrastructure]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]

    # Service containers — the di-token-identity integration test instantiates
    # the real provider graph (pg.Pool + KeyvRedis), so CI needs both reachable.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm turbo test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-minimum-32-characters-for-ci-runs
          API_BASE_URL: http://localhost:3000
          ALLOWED_ORIGINS: http://localhost:3000

      - name: Integration Tests
        run: pnpm --filter @boilerplate/shared-kernel test:integration
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-minimum-32-characters-for-ci-runs
          API_BASE_URL: http://localhost:3000
          ALLOWED_ORIGINS: http://localhost:3000

      - name: Architecture check
        run: pnpm deps

      - name: Build
        run: pnpm build

  migration-smoke:
    name: Migration Smoke Test
    needs: [ci]
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build database package
        run: pnpm --filter @boilerplate/database build

      - name: Init role timeouts
        run: pnpm --filter @boilerplate/database db:init-roles
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smoke

      - name: Detect generated migrations
        id: migrations
        run: |
          if [ -f packages/database/drizzle/meta/_journal.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No migrations generated yet (empty schema) -- skipping migrate steps."
          fi

      - name: Run migrations
        if: steps.migrations.outputs.exists == 'true'
        run: pnpm --filter @boilerplate/database db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smoke

      - name: Assert idempotent (second run must be no-op)
        if: steps.migrations.outputs.exists == 'true'
        run: pnpm --filter @boilerplate/database db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smoke
