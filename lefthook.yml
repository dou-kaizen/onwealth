min_version: 1.7.0

pre-commit:
  parallel: true
  jobs:
    - name: format
      glob: "*.{ts,tsx,js,cjs,mjs,mts,json}"
      run: pnpm oxfmt --write {staged_files}
      stage_fixed: true

    - name: lint-fix
      glob: "*.{ts,tsx,js,cjs,mjs,mts}"
      run: pnpm oxlint --fix {staged_files}
      stage_fixed: true

    - name: typecheck
      glob: "*.{ts,tsx,mts}"
      run: pnpm typecheck

pre-push:
  parallel: false
  jobs:
    - name: lint
      run: pnpm lint
    - name: test
      run: pnpm test
